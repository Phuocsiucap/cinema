version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./api_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file:
      - ./api_gateway/.env
      
    depends_on:
      - auth-service
      - cinema-service
      - seatbooking-service
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Auth Service
  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    # Removed ports binding for security (internal communication only)
      
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:${AUTH_SERVICE_PORT:-8002}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cinema Service
  cinema-service:
    build: ./services/cinema-service
    restart: unless-stopped
    env_file:
      - ./services/cinema-service/.env
    # Removed ports binding for security (internal communication only)
  
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:${CINEMA_SERVICE_PORT:-8003}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Seat Booking Service
  seatbooking-service:
    build: ./seatbooking-service
    restart: unless-stopped
    env_file:
      - ./seatbooking-service/.env
    # Removed ports binding for security (internal communication only)
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SEATBOOKING_SERVICE_PORT:-8004}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  cinema-frontend:
    build: ./cinema_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3


